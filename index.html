<!DOCTYPE html>
<html>
<head>
  <title>Guess Who 💕</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #ffe6f0;
    }

    h1 {
      color: #ff4d88;
    }

    button {
      padding: 10px 15px;
      margin: 10px;
      border: none;
      background: #ff4d88;
      color: white;
      cursor: pointer;
      border-radius: 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 120px);
      gap: 15px;
      justify-content: center;
      margin: auto;
    }

    .card {
      border: 2px solid #ff99cc;
      padding: 5px;
      background: white;
      cursor: pointer;
      width: 120px;
    }

    .card img {
      width: 100%;
      height: 140px;
      object-fit: contain;
      background: white;
    }

    .eliminated {
      opacity: 0.2;
    }
  </style>
</head>

<body>

<h1>💖 Guess Who 💖</h1>
<p>Click faces to eliminate!</p>

<button onclick="startGame()">New Game 🔄</button>

<div class="grid" id="grid"></div>

<script>
const people = [
  "Emma","Samarth","Ashish","Tabrez","Ram","Chinmay","Aditya","Ishan",
  "Shiv","Kris","Rayyan","Raushan","Samera","Hashir","Fisoye","Gade",
  "Suhas","Amrit","Jasmine","Tara","Saee","Malik","Muzzamil","Parva",
  "Tanisha","Kanha","Nolan","Nikita","Rohit","Satvik","Chakri"
];

const grid = document.getElementById("grid");

let secretPerson = "";

// 🎯 Start / Restart Game
function startGame() {
  grid.innerHTML = "";

  // pick random secret person
  secretPerson = people[Math.floor(Math.random() * people.length)];

  console.log("SECRET PERSON (debug only):", secretPerson);

  people.forEach(name => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="./${name}.jpeg" alt="${name}">
      <p>${name}</p>
    `;

    card.onclick = () => {
      card.classList.toggle("eliminated");

      // optional win check
      if (name === secretPerson) {
        alert("🎉 You clicked the secret person!");
      }
    };

    grid.appendChild(card);
  });
}

// start game automatically on load
startGame();
</script>

</body>
</html>
