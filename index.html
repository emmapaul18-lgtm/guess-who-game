<!DOCTYPE html>
<html>
<head>
  <title>Guess Who 💕</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #ffe6f0;
    }
    h1 {
      color: #ff4d88;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      max-width: 600px;
      margin: auto;
    }
    .card {
      border: 2px solid #ff99cc;
      padding: 5px;
      background: white;
      cursor: pointer;
    }
    .card img {
      width: 100%;
      height: 100px;
      object-fit: cover;
    }
    .eliminated {
      opacity: 0.2;
    }
  </style>
</head>

<body>

<h1>💖 Guess Who 💖</h1>
<p>Click faces to eliminate!</p>

<div class="grid" id="grid"></div>

<script>
const people = [
  "emma",
  "samarth",
  "ashish",
  "malik",
  "muzzamil",
  "parva",
  "tanisha",
  "kanha",
  "nolan",
  "nikita",
  "rohit",
  "satvik",
  "chakri"
];

const grid = document.getElementById("grid");

people.forEach(name => {
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <img src="${name}.jpeg">
    <p>${name}</p>
  `;

  card.onclick = () => {
    card.classList.toggle("eliminated");
  };

  grid.appendChild(card);
});
</script>

</body>
</html>
