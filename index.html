<!DOCTYPE html>
<html>
<head>
  <title>Guess Who 💕</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #ffe6f0;
    }

    h1 {
      color: #ff4d88;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 120px);
      gap: 15px;
      justify-content: center;
      margin: auto;
    }

    .card {
      border: 2px solid #ff99cc;
      padding: 5px;
      background: white;
      cursor: pointer;
      width: 120px;
    }

    .card img {
      width: 100%;
      height: 140px;
      object-fit: contain;
      background: white;
    }

    .eliminated {
      opacity: 0.2;
    }
  </style>
</head>

<body>

<h1>💖 Guess Who 💖</h1>
<p>Click faces to eliminate!</p>

<div class="grid" id="grid"></div>

<script>
const people = [
  "emma",
  "samarth",
  "ashish",
  "tabrez",
  "ram",
  "chinmay",
  "aditya",
  "ishan",
  "shiv",
  "kris",
  "rayyan",
  "raushan",
  "samera",
  "hashir",
  "fisoye",
  "gade",
  "suhas",
  "amrit",
  "jasmine",
  "tara",
  "saee",
  "malik",
  "muzzamil",
  "parva",
  "tanisha",
  "kanha",
  "nolan",
  "nikita",
  "rohit",
  "satvik",
  "chakri"
];

const grid = document.getElementById("grid");

people.forEach(name => {
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <img src="${name}.jpeg" alt="${name}">
    <p>${name}</p>
  `;

  card.onclick = () => {
    card.classList.toggle("eliminated");
  };

  grid.appendChild(card);
});
</script>

</body>
</html>
