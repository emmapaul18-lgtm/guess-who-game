<!DOCTYPE html>
<html>
<head>
  <title>Guess Who 💕</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #ffe6f0;
    }

    h1 {
      color: #ff4d88;
    }

    button {
      padding: 10px 15px;
      margin: 10px;
      border: none;
      background: #ff4d88;
      color: white;
      cursor: pointer;
      border-radius: 8px;
    }

    #timer {
      font-weight: bold;
      margin: 10px;
    }

    .top {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .secret-box {
      width: 120px;
      height: 140px;
      border: 2px dashed #ff4d88;
      background: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .secret-box img {
      width: 100%;
      height: 100px;
      object-fit: contain;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 120px);
      gap: 15px;
      justify-content: center;
      margin: auto;
    }

    .card {
      border: 2px solid #ff99cc;
      padding: 5px;
      background: white;
      cursor: pointer;
      width: 120px;
    }

    .card img {
      width: 100%;
      height: 140px;
      object-fit: contain;
      background: white;
    }

    .card p {
      font-size: 11px;
      margin: 4px 0 0 0;
      text-transform: lowercase;
    }

    .eliminated {
      opacity: 0.2;
    }
  </style>
</head>

<body>

<h1>💖 Guess Who 💖</h1>

<div class="top">
  <button onclick="startGame()">New Game 🔄</button>

  <div id="timer">⏱ Time: 0s</div>

  <div class="secret-box">
    🎯 Secret
    <img id="secretImg" src="" alt="">
    <div id="secretName"></div>
  </div>
</div>

<div class="grid" id="grid"></div>

<script>

const people = [
  "emma","samarth","ashish","tabrez","ram","chinmay","aditya","ishan",
  "shiv","kris","rayyan","raushan","samera","hashir","fisoye","gade",
  "suhas","amrit","jasmine","tara","saee","malik","muzzamil","parva",
  "tanisha","kahna","nolan","nikita","rohit","satvik","chakri"
];

const grid = document.getElementById("grid");
const timerDisplay = document.getElementById("timer");
const secretImg = document.getElementById("secretImg");
const secretName = document.getElementById("secretName");

let secretPerson = null;
let timer = null;
let seconds = 0;

// START GAME
function startGame() {
  grid.innerHTML = "";

  // reset timer FIRST
  clearInterval(timer);
  seconds = 0;
  timerDisplay.innerHTML = "⏱ Time: 0s";

  // ALWAYS pick valid random index (guaranteed 0–30)
  const randomIndex = Math.floor(Math.random() * people.length);
  secretPerson = people[randomIndex];

  // safety check (never empty)
  if (!secretPerson) {
    console.error("Secret person selection failed!");
    return;
  }

  console.log("SECRET:", secretPerson);

  // update secret box immediately
  secretImg.src = `./${secretPerson}.jpeg`;
  secretName.innerHTML = secretPerson;

  // start timer
  timer = setInterval(() => {
    seconds++;
    timerDisplay.innerHTML = `⏱ Time: ${seconds}s`;
  }, 1000);

  // build grid
  people.forEach(name => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="./${name}.jpeg" alt="${name}">
      <p>${name}</p>
    `;

    card.onclick = () => {
      card.classList.toggle("eliminated");

      if (name === secretPerson) {
        clearInterval(timer);
        alert(`🎉 You found ${secretPerson} in ${seconds}s!`);
      }
    };

    grid.appendChild(card);
  });
}

// auto start
startGame();

</script>

</body>
</html>
